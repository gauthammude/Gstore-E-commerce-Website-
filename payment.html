<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 20px;
        }

        h2 {
            color: #333;
            text-align: center;
        }

        .checkout-container {
            max-width: 400px;
            margin: 0 auto;
            background: #fff;
            padding: 25px 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .checkout-container p {
            margin: 10px 0;
            font-size: 16px;
        }

        .checkout-container img {
            display: block;
            margin: 10px auto;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            background-color: #28a745;
            color: white;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        .fail-form {
            margin-top: 20px;
        }

        .fail-form button {
            background-color: #dc3545;
        }

        .fail-form button:hover {
            background-color: #c82333;
        }

        .fail-form a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #007bff;
            text-align: center;
        }

        .fail-form a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <h2>Checkout</h2>
        <p>Product: {{ product_name }}</p>
        <p>Price: ${{ price }}</p>
        <img src="/media/{{ image }}" width="100" alt="Product Image" />

        <form action="{% url 'payment_success' %}" method="post">
            {% csrf_token %}
            <label>Card Number:</label>
            <input type="text" name="card_number" required>

            <label>Expiry:</label>
            <input type="text" name="expiry" required>

            <label>CVV:</label>
            <input type="password" name="cvv" required>

            <button type="submit">Pay Now</button>
        </form>

        <form class="fail-form" action="{% url 'payment_failed' %}" method="post">
            {% csrf_token %}
            <button type="submit">Simulate Failure</button>
            <a href="{% url 'index' %}">Go To Home</a>
        </form>
    </div>
</body>
</html>
